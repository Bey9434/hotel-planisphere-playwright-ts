version: 2

updates:
  # npm パッケージの定期アップデート
  # @playwright/test が更新されると playwright.yml の Docker イメージも自動追従する
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    # npm関連の全パッケージ更新を1つのPRにまとめる
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # GitHub Actions（actions/checkout 等）の定期アップデート
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    # Actions関連の全更新を1つのPRにまとめる
    groups:
      github-actions:
        patterns:
          - "*"
