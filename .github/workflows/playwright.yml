name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: "Test (${{ matrix.browser }})"
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # chromium / firefox / webkit を並列実行して CI 時間を削減
    # fail-fast: false で1ブラウザの失敗が他ジョブをキャンセルしないようにする
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-jammy
      options: --ipc=host
    steps:
      - uses: actions/checkout@v6

      - name: Configure git safe directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - uses: pnpm/action-setup@v5
        name: Install pnpm

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # blob: マトリックス完了後に merge-reports job でまとめる
      - name: Run Playwright tests (${{ matrix.browser }})
        run: npx dotenvx run -- npx playwright test --project=${{ matrix.browser }} --reporter=blob
        env:
          DOTENV_PRIVATE_KEY: ${{ secrets.DOTENV_PRIVATE_KEY }}
          HOME: /root

      # blob レポートをアーティファクトとして保存（merge-reports job が収集する）
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.browser }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge Test Reports
    needs: test
    # ユーザーキャンセル時以外（テスト失敗時等）は必ずレポートを生成する
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        name: Install pnpm

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 3ブラウザ分の blob レポートを全て取得
      - uses: actions/download-artifact@v6
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      # 3つの blob レポートを1つの HTML レポートにまとめる
      - name: Merge blob reports into HTML report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      # 最終的な HTML レポートを deploy-report job のために保存
      - uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy-report:
    name: Deploy Report
    needs: merge-reports
    if: github.ref == 'refs/heads/main' && always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: playwright-report/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
