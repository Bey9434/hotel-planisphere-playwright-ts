version: 2

updates:
  # npm パッケージの定期アップデート
  # @playwright/test が更新されると playwright.yml の Docker イメージも自動追従する
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions（actions/checkout 等）の定期アップデート
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
